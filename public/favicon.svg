<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- fondo oscuro con bordes redondeados -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!-- carta de atrás (leve rotación) -->
  <rect x="5" y="4" width="18" height="24" rx="3" fill="#1a1d27" stroke="#2e3248" stroke-width="1"
    transform="rotate(-10 14 16)"/>

  <!-- carta del frente -->
  <rect x="9" y="4" width="18" height="24" rx="3" fill="#1a1d27" stroke="#6c63ff" stroke-width="1.5"/>

  <!-- símbolo ♠ centrado en la carta del frente -->
  <text x="18" y="22" text-anchor="middle" font-size="13"
    font-family="Georgia, 'Times New Roman', serif" fill="#6c63ff">&#9824;</text>
</svg>
